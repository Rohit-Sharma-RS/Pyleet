<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>PyLeet — LeetCode Practice in Python</title>
    <meta
      name="description"
      content="Practice LeetCode problems with an in-browser Python editor. Paste a problem URL, write your solution, and run it against test cases instantly."
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- CodeMirror 5 -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css"
    />

    <!-- App CSS -->
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <svg
            class="logo-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
          </svg>
          <span class="logo-text">Py<span class="logo-accent">Leet</span></span>
        </div>
        <div class="header-right">
          <button class="history-toggle" id="historyToggle" onclick="toggleHistory()" title="Problem History">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span class="history-count" id="historyCount">0</span>
          </button>
          <div class="pyodide-status" id="pyodideStatus">
            <span class="status-dot loading"></span>
            <span class="status-text">Loading Python...</span>
          </div>
        </div>
      </div>
    </header>

    <!-- URL Input Section -->
    <section class="url-section">
      <div class="url-container">
        <div class="url-input-wrapper">
          <svg
            class="url-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"
            ></path>
            <path
              d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"
            ></path>
          </svg>
          <input
            type="text"
            id="urlInput"
            class="url-input"
            placeholder="Paste LeetCode problem URL (e.g., https://leetcode.com/problems/two-sum/)"
            autocomplete="off"
            spellcheck="false"
          />
          <button id="fetchBtn" class="fetch-btn" onclick="fetchProblem()">
            <svg
              class="btn-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
            <span>Fetch</span>
          </button>
        </div>
        <div class="url-error" id="urlError"></div>
      </div>
    </section>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loader">
        <div class="loader-ring"></div>
        <p class="loader-text" id="loaderText">Fetching problem...</p>
      </div>
    </div>

    <!-- Main Content (hidden until problem loaded) -->
    <main class="main-content" id="mainContent" style="display: none">
      <div class="workspace">
        <!-- Problem Panel -->
        <div class="panel problem-panel">
          <div class="panel-header">
            <div class="problem-title-row">
              <h1 id="problemTitle" class="problem-title"></h1>
              <span id="problemDifficulty" class="difficulty-badge"></span>
            </div>
            <div class="panel-tabs">
              <button
                class="tab-btn active"
                data-tab="description"
                onclick="switchTab('description')"
              >
                Description
              </button>
              <button
                class="tab-btn"
                data-tab="testcases"
                onclick="switchTab('testcases')"
              >
                Test Cases
              </button>
            </div>
          </div>
          <div class="panel-body">
            <div id="descriptionTab" class="tab-content active">
              <div id="problemDescription" class="problem-description"></div>
            </div>
            <div id="testcasesTab" class="tab-content">
              <div id="testCasesList" class="test-cases-list"></div>
            </div>
          </div>
        </div>

        <!-- Editor Panel -->
        <div class="panel editor-panel">
          <div class="panel-header">
            <div class="editor-header-row">
              <div class="editor-lang">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  width="16"
                  height="16"
                >
                  <polyline points="16 18 22 12 16 6"></polyline>
                  <polyline points="8 6 2 12 8 18"></polyline>
                </svg>
                <span>Python 3</span>
              </div>
              <div class="editor-actions">
                <button
                  class="action-btn reset-btn"
                  onclick="resetCode()"
                  title="Reset to template"
                >
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    width="16"
                    height="16"
                  >
                    <polyline points="1 4 1 10 7 10"></polyline>
                    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                  </svg>
                  <span>Reset</span>
                </button>
                <button
                  class="action-btn run-btn"
                  id="runBtn"
                  onclick="runCode()"
                >
                  <svg
                    viewBox="0 0 24 24"
                    fill="currentColor"
                    width="16"
                    height="16"
                  >
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                  </svg>
                  <span>Run</span>
                </button>
              </div>
            </div>
          </div>
          <div class="editor-container">
            <textarea id="codeEditor"></textarea>
          </div>

          <!-- Results Panel -->
          <div class="results-panel" id="resultsPanel" style="display: none">
            <div class="results-header">
              <h3 class="results-title" id="resultsTitle">Results</h3>
              <button class="close-results" onclick="closeResults()">✕</button>
            </div>
            <div class="results-body" id="resultsBody"></div>
          </div>
        </div>
      </div>
    </main>

    <!-- History Sidebar -->
    <div class="history-overlay" id="historyOverlay" onclick="toggleHistory()"></div>
    <aside class="history-sidebar" id="historySidebar">
      <div class="history-header">
        <h2 class="history-title">📋 Problem History</h2>
        <button class="close-history" onclick="toggleHistory()">✕</button>
      </div>
      <div class="history-stats" id="historyStats"></div>
      <div class="history-list" id="historyList">
        <div class="empty-state">
          <div class="empty-state-icon">📝</div>
          <p class="empty-state-text">No problems practiced yet.<br>Fetch a problem and run your solution!</p>
        </div>
      </div>
      <div class="history-footer">
        <button class="clear-history-btn" onclick="clearHistory()">Clear All History</button>
      </div>
    </aside>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/comment/comment.min.js"></script>
    <script src="/js/app.js"></script>
  </body>
</html>
